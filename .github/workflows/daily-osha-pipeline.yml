name: OSHA Sales Pipeline

on:
  workflow_dispatch:
    inputs:
      since_date:
        description: "Override SINCE_DATE (YYYY-MM-DD). Leave empty to use default env."
        required: false
        default: ""
      api_limit:
        description: "Override API_LIMIT for this run."
        required: false
        default: ""
      api_max_pages:
        description: "Override API_MAX_PAGES for this run."
        required: false
        default: ""
  schedule:
    # 16:10 UTC ~= 08:10 PT during standard time, 09:10 PT during daylight time.
    - cron: "10 16 * * *"

permissions:
  contents: read
  id-token: write

concurrency:
  group: osha-daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      BQ_DATASET: ${{ vars.BQ_DATASET }}
      PUBLIC_PROJECT_ID: ${{ vars.PUBLIC_PROJECT_ID }}
      PUBLIC_BQ_DATASET: ${{ vars.PUBLIC_BQ_DATASET }}
      RSS_PROJECT_ID: ${{ vars.RSS_PROJECT_ID }}
      RSS_BQ_DATASET: ${{ vars.RSS_BQ_DATASET }}
      RSS_FEED_URLS: ${{ vars.RSS_FEED_URLS }}
      RSS_LOOKBACK_DAYS: ${{ vars.RSS_LOOKBACK_DAYS }}
      RSS_MAX_ITEMS_PER_FEED: ${{ vars.RSS_MAX_ITEMS_PER_FEED }}
      RSS_COMPANY_SEARCH_LIMIT: ${{ vars.RSS_COMPANY_SEARCH_LIMIT }}
      PIPELINE_LOG_FILE: osha-sales-pipeline.log
      SINCE_DATE: ${{ github.event.inputs.since_date }}
      API_LIMIT: ${{ github.event.inputs.api_limit }}
      API_MAX_PAGES: ${{ github.event.inputs.api_max_pages }}
      ACCIDENT_API_LIMIT: ${{ vars.ACCIDENT_API_LIMIT }}
      ACCIDENT_API_MAX_PAGES: ${{ vars.ACCIDENT_API_MAX_PAGES }}
      API_MIN_INTERVAL_SECONDS: ${{ vars.API_MIN_INTERVAL_SECONDS }}
      API_TIMEOUT_SECONDS: ${{ vars.API_TIMEOUT_SECONDS }}
      API_MAX_RETRIES: ${{ vars.API_MAX_RETRIES }}
      API_BASE_BACKOFF_SECONDS: ${{ vars.API_BASE_BACKOFF_SECONDS }}
      API_MAX_REQUESTS_PER_RUN: ${{ vars.API_MAX_REQUESTS_PER_RUN }}
      API_USER_AGENT: ${{ vars.API_USER_AGENT }}
      FDA_PROJECT_ID: ${{ vars.FDA_PROJECT_ID }}
      FDA_BQ_DATASET: ${{ vars.FDA_BQ_DATASET }}
      FDA_LOOKBACK_YEARS: ${{ vars.FDA_LOOKBACK_YEARS }}
      EPA_PROJECT_ID: ${{ vars.EPA_PROJECT_ID }}
      EPA_BQ_DATASET: ${{ vars.EPA_BQ_DATASET }}
      NIH_PROJECT_ID: ${{ vars.NIH_PROJECT_ID }}
      NIH_BQ_DATASET: ${{ vars.NIH_BQ_DATASET }}
      NIH_LOOKBACK_YEARS: ${{ vars.NIH_LOOKBACK_YEARS }}
      CA_SOS_PROJECT_ID: ${{ vars.CA_SOS_PROJECT_ID }}
      CA_SOS_BQ_DATASET: ${{ vars.CA_SOS_BQ_DATASET }}
      CA_SOS_SUBSCRIPTION_KEY: ${{ secrets.CA_SOS_SUBSCRIPTION_KEY }}
      COMPLIANCE_STRICT_MODE: "true"
      DOL_API_TERMS_ACCEPTED: "true"
      DOL_API_POLICY_URL: ${{ vars.DOL_API_POLICY_URL }}
      DOL_API_POLICY_REVIEWED_ON: ${{ vars.DOL_API_POLICY_REVIEWED_ON }}
      DOL_API_CONTACT_EMAIL: ${{ vars.DOL_API_CONTACT_EMAIL }}
      DOL_API_INTENDED_USE: ${{ vars.DOL_API_INTENDED_USE }}
      DATA_RETENTION_DAYS: ${{ vars.DATA_RETENTION_DAYS }}
      DOL_API_KEY: ${{ secrets.DOL_API_KEY }}
      OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
      CENSUS_CBP_YEAR: ${{ vars.CENSUS_CBP_YEAR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.PROJECT_ID }}

      - name: Validate required env
        shell: bash
        run: |
          set -euo pipefail
          required=(
            PROJECT_ID
            BQ_DATASET
            DOL_API_KEY
            DOL_API_POLICY_REVIEWED_ON
            DOL_API_CONTACT_EMAIL
            DOL_API_INTENDED_USE
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: $key"
              exit 1
            fi
          done

      - name: Warm Google access token
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if gcloud auth print-access-token >/dev/null 2>&1; then
              exit 0
            fi
            echo "gcloud token warmup failed on attempt ${attempt}; retrying..."
            sleep $((attempt * 10))
          done
          echo "Unable to obtain Google access token after retries."
          exit 1

      - name: Run full sales pipeline
        run: python -m pipeline.cli --verbose run-full

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osha-sales-pipeline-log-${{ github.run_id }}
          path: osha-sales-pipeline.log
          if-no-files-found: ignore
